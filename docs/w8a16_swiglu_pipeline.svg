<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Offline dual-hemisphere W8A16 FFN pipeline</title>
  <desc id="desc">The complete ICU schedule for gate/up projection, pipelined VXM SwiGLU, and down projection.</desc>
  <style>
    text { font-family: "Segoe UI", Arial, sans-serif; fill: #17212b; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #586572; }
    .section { font-size: 18px; font-weight: 700; }
    .label { font-size: 13px; font-weight: 650; }
    .small { font-size: 11px; fill: #586572; }
    .bar { font-size: 11px; font-weight: 650; fill: #13202a; }
    .axis { stroke: #71808d; stroke-width: 1.4; }
    .grid { stroke: #dde3e8; stroke-width: 1; }
    .panel { fill: #fbfcfd; stroke: #cfd7de; stroke-width: 1.2; }
    .memr { fill: #8dcbb3; stroke: #397c66; }
    .memw { fill: #f0cc7d; stroke: #907126; }
    .vxm { fill: #ed9a70; stroke: #995331; }
    .gate { fill: #79a9e2; stroke: #356da9; }
    .up { fill: #a59ada; stroke: #625594; }
    .accg { fill: #d999b8; stroke: #8c4f6b; }
    .accu { fill: #e6ad70; stroke: #986523; }
    .idle { fill: #eef2f5; stroke: #aeb8c1; }
    .east { fill: none; stroke: #367e6b; stroke-width: 2; }
    .west { fill: none; stroke: #765f9f; stroke-width: 2; }
  </style>

  <rect width="1600" height="1120" fill="#ffffff"/>
  <text x="42" y="45" class="title">Dual-hemisphere W8A16 FFN pipeline</text>
  <text x="42" y="71" class="subtitle">X[128,576] -&gt; gate/up[128,1536] -&gt; SwiGLU[128,1536] -&gt; down[128,576] fp16</text>

  <text x="42" y="112" class="section">Complete offline ICU workload</text>
  <text x="307" y="112" class="small">gate/up + fused SwiGLU: 59,674 cycles | down: 31,143 cycles | total: 90,817 cycles</text>
  <rect x="42" y="130" width="1516" height="166" rx="6" class="panel"/>
  <line x1="235" y1="166" x2="1515" y2="166" class="axis"/>
  <line x1="235" y1="158" x2="235" y2="280" class="grid"/>
  <line x1="1076" y1="158" x2="1076" y2="280" class="grid"/>
  <line x1="1515" y1="158" x2="1515" y2="280" class="grid"/>
  <text x="228" y="153" class="small">0</text>
  <text x="1043" y="153" class="small">59,674</text>
  <text x="1482" y="153" class="small">90,817</text>
  <text x="42" y="200" class="label">East hemisphere</text>
  <rect x="235" y="181" width="841" height="27" rx="3" class="gate"/>
  <rect x="1076" y="181" width="439" height="27" rx="3" class="gate"/>
  <text x="655" y="199" text-anchor="middle" class="bar">MXM0 gate + MXM1 up; final reduction streams into VXM SwiGLU</text>
  <text x="1295" y="199" text-anchor="middle" class="bar">MXM0/1 down, wave-local II=128</text>
  <text x="42" y="242" class="label">West hemisphere</text>
  <rect x="235" y="223" width="841" height="27" rx="3" class="up"/>
  <rect x="1076" y="223" width="346" height="27" rx="3" class="up"/>
  <rect x="1422" y="223" width="93" height="27" rx="3" class="idle"/>
  <text x="655" y="241" text-anchor="middle" class="bar">East/West row blocks alternate through the shared VXM pipeline</text>
  <text x="1249" y="241" text-anchor="middle" class="bar">MXM2/3 down, wave-local II=128</text>
  <text x="875" y="274" text-anchor="middle" class="small">The standalone SwiGLU readback pass is eliminated; final FFN write and drain end at cycle 90,817.</text>

  <text x="42" y="337" class="section">Steady-state projection K tile: S .. S+128</text>
  <text x="390" y="337" class="small">Compute K while VXM dequant and IW fill K+1 in the alternate weight buffer.</text>
  <rect x="42" y="354" width="1516" height="390" rx="6" class="panel"/>
  <line x1="235" y1="388" x2="1515" y2="388" class="axis"/>
  <g class="small">
    <text x="231" y="379">0</text><text x="547" y="379">32</text><text x="867" y="379">64</text>
    <text x="1187" y="379">96</text><text x="1494" y="379">128</text>
  </g>
  <g class="grid">
    <line x1="235" y1="388" x2="235" y2="722"/><line x1="555" y1="388" x2="555" y2="722"/>
    <line x1="875" y1="388" x2="875" y2="722"/><line x1="1195" y1="388" x2="1195" y2="722"/>
    <line x1="1515" y1="388" x2="1515" y2="722"/>
  </g>

  <text x="58" y="423" class="label">MEM next W Read</text>
  <rect x="235" y="404" width="80" height="25" rx="3" class="memr"/><rect x="555" y="404" width="80" height="25" rx="3" class="memr"/>
  <text x="275" y="421" text-anchor="middle" class="bar">MXM0</text><text x="595" y="421" text-anchor="middle" class="bar">MXM1</text>
  <text x="58" y="460" class="label">VXM Dequant K+1</text>
  <rect x="255" y="441" width="80" height="25" rx="3" class="vxm"/><rect x="575" y="441" width="80" height="25" rx="3" class="vxm"/>
  <text x="295" y="458" text-anchor="middle" class="bar">E then W</text><text x="615" y="458" text-anchor="middle" class="bar">E then W</text>
  <text x="58" y="497" class="label">MXM0 IW K+1</text>
  <rect x="395" y="478" width="80" height="25" rx="2" class="gate"/><text x="435" y="495" text-anchor="middle" class="bar">alt buffer</text>
  <text x="58" y="534" class="label">MXM1 IW K+1</text>
  <rect x="715" y="515" width="80" height="25" rx="2" class="up"/><text x="755" y="532" text-anchor="middle" class="bar">alt buffer</text>

  <text x="58" y="571" class="label">MEM X Read</text>
  <text x="58" y="608" class="label">MXM0 gate Compute</text>
  <text x="58" y="645" class="label">MXM1 up Compute</text>
  <text x="58" y="682" class="label">ACC group9 gate</text>
  <text x="58" y="719" class="label">ACC group10 up</text>
  <g>
    <rect x="235" y="552" width="320" height="25" rx="3" class="memr"/>
    <rect x="235" y="589" width="320" height="25" rx="3" class="gate"/>
    <rect x="235" y="626" width="320" height="25" rx="3" class="up"/>
    <rect x="295" y="663" width="320" height="25" rx="3" class="accg"/>
    <rect x="285" y="700" width="320" height="25" rx="3" class="accu"/>
    <text x="395" y="569" text-anchor="middle" class="bar">32 X vectors</text>
    <text x="395" y="606" text-anchor="middle" class="bar">row block 0, shared activation E16..E17</text>
    <text x="395" y="643" text-anchor="middle" class="bar">row block 0, shared activation E16..E17</text>
  </g>
  <g transform="translate(320,0)">
    <rect x="235" y="552" width="320" height="25" rx="3" class="memr"/><rect x="235" y="589" width="320" height="25" rx="3" class="gate"/>
    <rect x="235" y="626" width="320" height="25" rx="3" class="up"/><rect x="295" y="663" width="320" height="25" rx="3" class="accg"/><rect x="285" y="700" width="320" height="25" rx="3" class="accu"/>
    <text x="395" y="606" text-anchor="middle" class="bar">row block 1, shared E0..E1</text><text x="395" y="643" text-anchor="middle" class="bar">row block 1, shared E0..E1</text>
  </g>
  <g transform="translate(640,0)">
    <rect x="235" y="552" width="320" height="25" rx="3" class="memr"/><rect x="235" y="589" width="320" height="25" rx="3" class="gate"/>
    <rect x="235" y="626" width="320" height="25" rx="3" class="up"/><rect x="295" y="663" width="320" height="25" rx="3" class="accg"/><rect x="285" y="700" width="320" height="25" rx="3" class="accu"/>
    <text x="395" y="606" text-anchor="middle" class="bar">row block 2</text><text x="395" y="643" text-anchor="middle" class="bar">row block 2</text>
  </g>
  <g transform="translate(960,0)">
    <rect x="235" y="552" width="320" height="25" rx="3" class="memr"/><rect x="235" y="589" width="320" height="25" rx="3" class="gate"/>
    <rect x="235" y="626" width="320" height="25" rx="3" class="up"/><rect x="295" y="663" width="320" height="25" rx="3" class="accg"/><rect x="285" y="700" width="320" height="25" rx="3" class="accu"/>
    <text x="395" y="606" text-anchor="middle" class="bar">row block 3</text><text x="395" y="643" text-anchor="middle" class="bar">row block 3</text>
  </g>

  <text x="42" y="786" class="section">Final K reduction + fused SwiGLU: 64 columns x 128 rows</text>
  <text x="530" y="786" class="small">East and West 32-row blocks alternate; accumulator output enters VXM without MEM readback.</text>
  <rect x="42" y="803" width="1516" height="122" rx="6" class="panel"/>
  <text x="58" y="842" class="label">MEM ACC Stream</text>
  <rect x="235" y="823" width="1090" height="25" rx="3" class="memr"/>
  <text x="780" y="840" text-anchor="middle" class="bar">final accumulate + clear: gate W0..W3, up W4..W7</text>
  <text x="58" y="879" class="label">VXM SwiGLU</text>
  <rect x="291" y="860" width="1090" height="25" rx="3" class="vxm"/>
  <text x="836" y="877" text-anchor="middle" class="bar">Mul(gate,up) -&gt; Sigmoid path -&gt; Mul -&gt; Cast fp16; one vector issued every cycle</text>
  <text x="58" y="916" class="label">MEM output Write</text>
  <rect x="362" y="897" width="1090" height="25" rx="3" class="memw"/>
  <text x="907" y="914" text-anchor="middle" class="bar">E0/E1 -&gt; slices 29/30 in both hemispheres, latency 13 cycles</text>

  <text x="42" y="966" class="section">Down projection data path</text>
  <rect x="42" y="983" width="1516" height="82" rx="6" class="panel"/>
  <text x="58" y="1015" class="label">SwiGLU MEM</text><rect x="235" y="997" width="210" height="25" rx="3" class="memr"/>
  <text x="340" y="1014" text-anchor="middle" class="bar">local W16/W17 copy per hemisphere</text>
  <text x="468" y="1015" class="label">Local fanout</text><rect x="570" y="997" width="210" height="25" rx="3" class="vxm"/>
  <text x="675" y="1014" text-anchor="middle" class="bar">shared E8..E9, E12..E13, or E16..E17</text>
  <text x="803" y="1015" class="label">4 x MXM</text><rect x="875" y="997" width="210" height="25" rx="3" class="gate"/>
  <text x="980" y="1014" text-anchor="middle" class="bar">48 K-block reductions</text>
  <text x="1110" y="1015" class="label">Final cast</text><rect x="1190" y="997" width="210" height="25" rx="3" class="memw"/>
  <text x="1295" y="1014" text-anchor="middle" class="bar">FP32 -&gt; FP16 -&gt; MEM</text>
  <text x="58" y="1051" class="small">Ping-pong IW keeps each 48-reduction wave at II=128; wave boundaries drain output and seed the next group.</text>

  <rect x="42" y="1090" width="13" height="13" class="memr"/><text x="62" y="1101" class="small">MEM Read</text>
  <rect x="141" y="1090" width="13" height="13" class="gate"/><text x="161" y="1101" class="small">MXM0 / down</text>
  <rect x="276" y="1090" width="13" height="13" class="up"/><text x="296" y="1101" class="small">MXM1 / down</text>
  <rect x="411" y="1090" width="13" height="13" class="accg"/><text x="431" y="1101" class="small">ACC group9</text>
  <rect x="526" y="1090" width="13" height="13" class="accu"/><text x="546" y="1101" class="small">ACC group10</text>
  <rect x="655" y="1090" width="13" height="13" class="vxm"/><text x="675" y="1101" class="small">VXM</text>
  <rect x="731" y="1090" width="13" height="13" class="memw"/><text x="751" y="1101" class="small">MEM Write</text>
</svg>
