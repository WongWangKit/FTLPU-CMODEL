<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Offline dual-hemisphere W8A16 SwiGLU pipeline</title>
  <desc id="desc">The complete ICU schedule for gate and up projection followed by a pipelined VXM SwiGLU pass.</desc>
  <style>
    text { font-family: "Segoe UI", Arial, sans-serif; fill: #17212b; letter-spacing: 0; }
    .title { font-size: 28px; font-weight: 700; }
    .subtitle { font-size: 14px; fill: #586572; }
    .section { font-size: 18px; font-weight: 700; }
    .label { font-size: 13px; font-weight: 650; }
    .small { font-size: 11px; fill: #586572; }
    .bar { font-size: 11px; font-weight: 650; fill: #13202a; }
    .axis { stroke: #71808d; stroke-width: 1.4; }
    .grid { stroke: #dde3e8; stroke-width: 1; }
    .panel { fill: #fbfcfd; stroke: #cfd7de; stroke-width: 1.2; }
    .memr { fill: #8dcbb3; stroke: #397c66; }
    .memw { fill: #f0cc7d; stroke: #907126; }
    .vxm { fill: #ed9a70; stroke: #995331; }
    .gate { fill: #79a9e2; stroke: #356da9; }
    .up { fill: #a59ada; stroke: #625594; }
    .accg { fill: #d999b8; stroke: #8c4f6b; }
    .accu { fill: #e6ad70; stroke: #986523; }
    .idle { fill: #eef2f5; stroke: #aeb8c1; }
    .east { fill: none; stroke: #367e6b; stroke-width: 2; }
    .west { fill: none; stroke: #765f9f; stroke-width: 2; }
  </style>

  <rect width="1600" height="980" fill="#ffffff"/>
  <text x="42" y="45" class="title">Dual-hemisphere W8A16 SwiGLU pipeline</text>
  <text x="42" y="71" class="subtitle">X[128,576] fp16 x Wgate/Wup[576,1536] int8 -&gt; gate/up fp32 -&gt; SwiGLU[128,1536] fp16</text>

  <text x="42" y="112" class="section">Complete offline ICU workload</text>
  <text x="307" y="112" class="small">24 output pairs x 18 K tiles x 234 cycles, then 24 x 128 x 2 pipelined SwiGLU issues</text>
  <rect x="42" y="130" width="1516" height="166" rx="6" class="panel"/>
  <line x1="235" y1="166" x2="1515" y2="166" class="axis"/>
  <line x1="235" y1="158" x2="235" y2="280" class="grid"/>
  <line x1="1438" y1="158" x2="1438" y2="280" class="grid"/>
  <line x1="1511" y1="158" x2="1511" y2="280" class="grid"/>
  <text x="228" y="153" class="small">0</text>
  <text x="1405" y="153" class="small">101,088</text>
  <text x="1478" y="153" class="small">107,261</text>
  <text x="42" y="200" class="label">East hemisphere</text>
  <rect x="235" y="181" width="1203" height="27" rx="3" class="gate"/>
  <rect x="1438" y="181" width="73" height="27" rx="3" class="vxm"/>
  <text x="785" y="199" text-anchor="middle" class="bar">MXM0 gate + MXM1 up projection, alternating 32-column tiles</text>
  <text x="1474" y="199" text-anchor="middle" class="bar">SwiGLU</text>
  <text x="42" y="242" class="label">West hemisphere</text>
  <rect x="235" y="223" width="1203" height="27" rx="3" class="up"/>
  <rect x="1438" y="223" width="73" height="27" rx="3" class="vxm"/>
  <text x="785" y="241" text-anchor="middle" class="bar">Same schedule in parallel for the adjacent 32 columns</text>
  <text x="1474" y="241" text-anchor="middle" class="bar">SwiGLU</text>
  <rect x="1511" y="181" width="4" height="69" class="idle"/>
  <text x="875" y="274" text-anchor="middle" class="small">SwiGLU starts at cycle 101,104; final MEM write ends at 107,261; system drain ends at 107,277.</text>

  <text x="42" y="337" class="section">One projection K tile: S .. S+234</text>
  <text x="335" y="337" class="small">Both hemispheres work concurrently; VXM dequant is staggered because all 16 ALU queues are shared.</text>
  <rect x="42" y="354" width="1516" height="390" rx="6" class="panel"/>
  <line x1="235" y1="388" x2="1515" y2="388" class="axis"/>
  <g class="small">
    <text x="231" y="379">0</text><text x="444" y="379">40</text><text x="663" y="379">80</text>
    <text x="879" y="379">120</text><text x="1098" y="379">160</text><text x="1316" y="379">200</text><text x="1494" y="379">234</text>
  </g>
  <g class="grid">
    <line x1="235" y1="388" x2="235" y2="722"/><line x1="454" y1="388" x2="454" y2="722"/>
    <line x1="673" y1="388" x2="673" y2="722"/><line x1="891" y1="388" x2="891" y2="722"/>
    <line x1="1110" y1="388" x2="1110" y2="722"/><line x1="1329" y1="388" x2="1329" y2="722"/>
    <line x1="1515" y1="388" x2="1515" y2="722"/>
  </g>

  <text x="58" y="423" class="label">MEM weight Read</text>
  <rect x="240" y="404" width="126" height="25" rx="3" class="memr"/>
  <text x="303" y="421" text-anchor="middle" class="bar">W8, 8 slices</text>
  <text x="58" y="460" class="label">VXM Dequant</text>
  <rect x="290" y="441" width="44" height="25" rx="3" class="vxm"/>
  <text x="312" y="458" text-anchor="middle" class="bar">East</text>
  <rect x="334" y="441" width="44" height="25" rx="3" class="vxm" opacity="0.76"/>
  <text x="356" y="458" text-anchor="middle" class="bar">West</text>
  <text x="389" y="458" class="small">c10..25</text>
  <text x="58" y="497" class="label">MXM0 IW gate</text>
  <rect x="366" y="478" width="22" height="25" rx="2" class="gate"/>
  <rect x="410" y="478" width="22" height="25" rx="2" class="gate" opacity="0.72"/>
  <text x="449" y="495" class="small">buffer0, four pulses per hemisphere</text>
  <text x="58" y="534" class="label">MXM1 IW up</text>
  <rect x="388" y="515" width="22" height="25" rx="2" class="up"/>
  <rect x="432" y="515" width="22" height="25" rx="2" class="up" opacity="0.72"/>
  <text x="469" y="532" class="small">buffer0, four pulses per hemisphere</text>

  <text x="58" y="571" class="label">MEM X Read</text>
  <text x="58" y="608" class="label">MXM0 gate Compute</text>
  <text x="58" y="645" class="label">MXM1 up Compute</text>
  <text x="58" y="682" class="label">ACC group9 gate</text>
  <text x="58" y="719" class="label">ACC group10 up</text>
  <g>
    <rect x="437" y="552" width="175" height="25" rx="3" class="memr"/>
    <rect x="464" y="589" width="175" height="25" rx="3" class="gate"/>
    <rect x="464" y="626" width="175" height="25" rx="3" class="up"/>
    <rect x="497" y="663" width="175" height="25" rx="3" class="accg"/>
    <rect x="491" y="700" width="175" height="25" rx="3" class="accu"/>
    <text x="524" y="569" text-anchor="middle" class="bar">32 X vectors</text>
    <text x="551" y="606" text-anchor="middle" class="bar">row block 0</text>
    <text x="551" y="643" text-anchor="middle" class="bar">row block 0</text>
  </g>
  <g transform="translate(263,0)">
    <rect x="437" y="552" width="175" height="25" rx="3" class="memr"/><rect x="464" y="589" width="175" height="25" rx="3" class="gate"/>
    <rect x="464" y="626" width="175" height="25" rx="3" class="up"/><rect x="497" y="663" width="175" height="25" rx="3" class="accg"/><rect x="491" y="700" width="175" height="25" rx="3" class="accu"/>
    <text x="551" y="606" text-anchor="middle" class="bar">row block 1</text><text x="551" y="643" text-anchor="middle" class="bar">row block 1</text>
  </g>
  <g transform="translate(525,0)">
    <rect x="437" y="552" width="175" height="25" rx="3" class="memr"/><rect x="464" y="589" width="175" height="25" rx="3" class="gate"/>
    <rect x="464" y="626" width="175" height="25" rx="3" class="up"/><rect x="497" y="663" width="175" height="25" rx="3" class="accg"/><rect x="491" y="700" width="175" height="25" rx="3" class="accu"/>
    <text x="551" y="606" text-anchor="middle" class="bar">row block 2</text><text x="551" y="643" text-anchor="middle" class="bar">row block 2</text>
  </g>
  <g transform="translate(788,0)">
    <rect x="437" y="552" width="175" height="25" rx="3" class="memr"/><rect x="464" y="589" width="175" height="25" rx="3" class="gate"/>
    <rect x="464" y="626" width="175" height="25" rx="3" class="up"/><rect x="497" y="663" width="175" height="25" rx="3" class="accg"/><rect x="491" y="700" width="175" height="25" rx="3" class="accu"/>
    <text x="551" y="606" text-anchor="middle" class="bar">row block 3</text><text x="551" y="643" text-anchor="middle" class="bar">row block 3</text>
  </g>

  <text x="42" y="786" class="section">Final SwiGLU block: 64 columns x 128 rows</text>
  <text x="410" y="786" class="small">256 issue cycles; East and West alternate each cycle and the six VXM stages remain full.</text>
  <rect x="42" y="803" width="1516" height="122" rx="6" class="panel"/>
  <text x="58" y="842" class="label">MEM ACC Read</text>
  <rect x="235" y="823" width="1090" height="25" rx="3" class="memr"/>
  <text x="780" y="840" text-anchor="middle" class="bar">gate fp32 on W0..W3 + up fp32 on W4..W7</text>
  <text x="58" y="879" class="label">VXM SwiGLU</text>
  <rect x="291" y="860" width="1090" height="25" rx="3" class="vxm"/>
  <text x="836" y="877" text-anchor="middle" class="bar">Mul(gate,up) -&gt; Sigmoid path -&gt; Mul -&gt; Cast fp16; one vector issued every cycle</text>
  <text x="58" y="916" class="label">MEM output Write</text>
  <rect x="362" y="897" width="1090" height="25" rx="3" class="memw"/>
  <text x="907" y="914" text-anchor="middle" class="bar">E0/E1 -&gt; slices 29/30, latency 13 cycles</text>

  <rect x="42" y="948" width="13" height="13" class="memr"/><text x="62" y="959" class="small">MEM Read</text>
  <rect x="141" y="948" width="13" height="13" class="gate"/><text x="161" y="959" class="small">MXM0 gate</text>
  <rect x="252" y="948" width="13" height="13" class="up"/><text x="272" y="959" class="small">MXM1 up</text>
  <rect x="356" y="948" width="13" height="13" class="accg"/><text x="376" y="959" class="small">ACC gate</text>
  <rect x="459" y="948" width="13" height="13" class="accu"/><text x="479" y="959" class="small">ACC up</text>
  <rect x="548" y="948" width="13" height="13" class="vxm"/><text x="568" y="959" class="small">VXM</text>
  <rect x="624" y="948" width="13" height="13" class="memw"/><text x="644" y="959" class="small">MEM Write</text>
</svg>
